<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Login with FastAPI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center">
    
    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md border border-gray-100">
        
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-100 rounded-full mb-3">
                <i class="fas fa-user-circle text-4xl text-blue-600"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">សូមស្វាគមន៍</h1>
            <p class="text-gray-500 text-sm">ចូលគណនីរបស់អ្នក</p>
        </div>

        <div id="userInfo" class="hidden text-center mb-6">
            <div class="flex flex-col items-center">
                <img id="userAvatar" src="" alt="Profile" 
                     class="w-20 h-20 rounded-full border-4 border-blue-200 mb-3 object-cover">
                <h2 id="userName" class="text-xl font-semibold text-gray-800">User Name</h2>
                <p id="userEmail" class="text-gray-500 text-sm">email@example.com</p>
            </div>
        </div>

        <div id="loginSection">
            <button id="googleLoginBtn" 
                    class="w-full flex items-center justify-center gap-3 bg-white border-2 border-gray-200 hover:border-blue-400 text-gray-700 py-3 px-4 rounded-xl transition-all duration-200 hover:shadow-md group">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" 
                     alt="Google" class="w-6 h-6">
                <span class="font-medium group-hover:text-blue-600">ចូលជាមួយ Google</span>
            </button>
            <p class="text-xs text-gray-400 text-center mt-4">ដោយការចូល អ្នកយល់ព្រមនឹងលក្ខខណ្ឌប្រើប្រាស់</p>
        </div>

        <div id="logoutSection" class="hidden">
            <button id="logoutBtn" 
                    class="w-full bg-red-50 hover:bg-red-100 text-red-600 py-3 px-4 rounded-xl transition-all duration-200 font-medium flex items-center justify-center gap-2">
                <i class="fas fa-sign-out-alt"></i>
                ចេញពីគណនី
            </button>
        </div>

        <div id="loadingSpinner" class="hidden text-center py-4">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-blue-500 border-t-transparent"></div>
            <p class="text-sm text-gray-500 mt-2">កំពុងផ្ទុក...</p>
        </div>

        <div id="errorMessage" class="hidden mt-4 p-3 bg-red-50 border border-red-200 rounded-lg text-red-600 text-sm text-center">
            <i class="fas fa-exclamation-circle mr-2"></i>
            <span id="errorText">មានបញ្ហាកើតឡើង</span>
        </div>

    </div>

    <script>
        let currentUser = null;

        const loginSection = document.getElementById('loginSection');
        const logoutSection = document.getElementById('logoutSection');
        const userInfo = document.getElementById('userInfo');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');

        const userName = document.getElementById('userName');
        const userEmail = document.getElementById('userEmail');
        const userAvatar = document.getElementById('userAvatar');

        async function checkUserStatus() {
            showLoading(true);
            try {
                const response = await fetch('/api/user');
                const data = await response.json();
                
                if (data && !data.error) {
                    currentUser = data;
                    showLoggedInState(data);
                } else {
                    showLoggedOutState();
                }
            } catch (error) {
                console.error('Error checking user status:', error);
                showError('មិនអាចពិនិត្យស្ថានភាពអ្នកប្រើប្រាស់បានទេ');
                showLoggedOutState();
            } finally {
                showLoading(false);
            }
        }

        function showLoggedInState(user) {
            loginSection.classList.add('hidden');
            userInfo.classList.remove('hidden');
            logoutSection.classList.remove('hidden');
            
            userName.textContent = user.name || 'User';
            userEmail.textContent = user.email || '';
            userAvatar.src = user.picture || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(user.name || 'U') + '&background=random';
        }

        function showLoggedOutState() {
            loginSection.classList.remove('hidden');
            userInfo.classList.add('hidden');
            logoutSection.classList.add('hidden');
            currentUser = null;
        }

        function showLoading(show) {
            if (show) {
                loadingSpinner.classList.remove('hidden');
            } else {
                loadingSpinner.classList.add('hidden');
            }
        }

        function showError(message) {
            errorText.textContent = message;
            errorMessage.classList.remove('hidden');
            setTimeout(() => {
                errorMessage.classList.add('hidden');
            }, 5000);
        }

        document.getElementById('googleLoginBtn').addEventListener('click', () => {
            window.location.href = '/auth/login';
        });

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            showLoading(true);
            try {
                const response = await fetch('/auth/logout');
                if (response.ok) {
                    showLoggedOutState();
                } else {
                    showError('មិនអាចចេញពីគណនីបានទេ');
                }
            } catch (error) {
                console.error('Logout error:', error);
                showError('មានបញ្ហាក្នុងការចេញពីគណនី');
            } finally {
                showLoading(false);
            }
        });

        document.addEventListener('DOMContentLoaded', checkUserStatus);

        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('error') === 'authentication_failed') {
            showError('ការផ្ទៀងផ្ទាត់បរាជ័យ។ សូមព្យាយាមម្តងទៀត');
        }
    </script>
</body>
</html>
